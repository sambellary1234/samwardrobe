<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>My Wardrobe</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f3;--card:#fff;--input:#f0ede8;
  --text:#1a1816;--muted:#79756f;--light:#b5b0a8;
  --accent:#c4984a;--accent-dk:#8c6520;
  --border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.16);
  --sh:0 2px 14px rgba(0,0,0,.07);--sh2:0 8px 32px rgba(0,0,0,.12);
  --r:14px;--rs:8px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#141210;--card:#1d1b17;--input:#272420;
  --text:#ede9e2;--muted:#88837b;--light:#58534b;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.15);
  --sh:0 2px 14px rgba(0,0,0,.35);--sh2:0 8px 32px rgba(0,0,0,.5);
}}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{padding:1.75rem 2rem 0;border-bottom:1px solid var(--border)}
header h1{font-family:'DM Serif Display',serif;font-size:36px;font-weight:400;letter-spacing:-.5px}
header p{font-size:13px;color:var(--muted);margin-top:4px}
.tabs{display:flex;margin-top:1.25rem}
.tab{padding:9px 20px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .18s}
.tab:hover{color:var(--text)}
.tab.on{color:var(--text);border-bottom-color:var(--text);font-weight:500}
#spendBar{background:var(--text);color:var(--bg);padding:.8rem 2rem;display:flex;flex-wrap:wrap;gap:1.75rem;align-items:center;min-height:44px}
.sp-main{display:flex;align-items:baseline;gap:8px}
.sp-main .num{font-family:'DM Serif Display',serif;font-size:24px;color:var(--accent)}
.sp-main .lbl{font-size:11px;opacity:.5;text-transform:uppercase;letter-spacing:.08em}
.sp-cats{display:flex;gap:1.25rem;flex-wrap:wrap}
.sp-cat{display:flex;flex-direction:column;gap:1px}
.sp-cat .n{font-size:13px;font-weight:500}
.sp-cat .l{font-size:10px;opacity:.4;text-transform:uppercase;letter-spacing:.05em}
.main{padding:1.5rem 2rem;max-width:1120px;margin:0 auto}
.view{display:none}.view.on{display:block}
.cat-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.5rem}
.cb{padding:6px 14px;border-radius:30px;border:1px solid var(--border2);background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;color:var(--muted);transition:all .18s}
.cb:hover{color:var(--text);border-color:var(--text)}
.cb.on{background:var(--text);color:var(--bg);border-color:var(--text)}
.add-trigger{display:flex;align-items:center;gap:10px;padding:14px 18px;border:1.5px dashed var(--border2);border-radius:var(--r);cursor:pointer;color:var(--muted);font-size:14px;font-family:'DM Sans',sans-serif;background:transparent;width:100%;margin-bottom:1.75rem;transition:all .18s;text-align:left}
.add-trigger:hover{border-color:var(--accent);color:var(--accent-dk)}
.add-trigger .plus{width:32px;height:32px;border-radius:50%;background:var(--card);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--accent-dk);flex-shrink:0}
.section{margin-bottom:2rem}
.sec-hd{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sec-hd span{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--light)}
.sec-hd::after{content:'';flex:1;height:1px;background:var(--border)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.icard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);cursor:pointer;transition:box-shadow .2s,transform .2s,border-color .2s;position:relative}
.icard:hover{box-shadow:var(--sh2);transform:translateY(-3px);border-color:var(--accent)}
.icard-media{position:relative;width:100%;height:155px;overflow:hidden;background:var(--input)}
.icard-media img{width:100%;height:100%;object-fit:cover;display:block}
.icard-swatch{width:100%;height:155px}
.edit-hint{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.5);color:#fff;font-size:11px;text-align:center;padding:5px 0;opacity:0;transition:opacity .15s;pointer-events:none}
.icard:hover .edit-hint{opacity:1}
.icard-body{padding:11px 13px}
.icard-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.icard-cat{font-size:10px;color:var(--light);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.icard-foot{display:flex;align-items:center;justify-content:space-between;gap:6px}
.icard-price{font-family:'DM Serif Display',serif;font-size:16px;color:var(--accent-dk)}
.icard-link{font-size:11px;color:var(--muted);text-decoration:none;border:1px solid var(--border2);padding:3px 8px;border-radius:20px;transition:all .15s;white-space:nowrap}
.icard-link:hover{background:var(--input);color:var(--text)}
.empty{padding:3rem;text-align:center;color:var(--light);font-size:14px;background:var(--card);border:1px dashed var(--border2);border-radius:var(--r);grid-column:1/-1}
/* drawer */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;opacity:0;pointer-events:none;transition:opacity .22s}
.overlay.on{opacity:1;pointer-events:all}
.drawer{position:fixed;right:0;top:0;bottom:0;width:440px;max-width:100vw;background:var(--card);z-index:101;transform:translateX(105%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-6px 0 40px rgba(0,0,0,.18)}
.drawer.on{transform:none}
.dh{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.dh h3{font-family:'DM Serif Display',serif;font-size:20px;font-weight:400}
.dclose{width:30px;height:30px;border-radius:50%;border:1px solid var(--border2);background:transparent;font-size:18px;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:sans-serif;line-height:1}
.dclose:hover{background:var(--input);color:var(--text)}
.dbody{flex:1;overflow-y:auto;padding:1.5rem}
.dimg-wrap{width:100%;height:200px;border-radius:var(--r);border:1px solid var(--border);background:var(--input);overflow:hidden;display:flex;align-items:center;justify-content:center;margin-bottom:1.25rem}
.dimg-wrap img{width:100%;height:100%;object-fit:contain}
.dimg-placeholder{font-size:13px;color:var(--light);text-align:center;padding:1rem;line-height:1.5}
.df{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.df label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.df input,.df select,.df textarea{padding:10px 12px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--input);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .15s;width:100%}
.df input:focus,.df select:focus,.df textarea:focus{border-color:var(--accent)}
.df textarea{resize:vertical;min-height:76px;line-height:1.55}
.df input[type=color]{height:40px;padding:4px 7px;cursor:pointer}
.dtwo{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.durl-row{display:flex;gap:8px;align-items:flex-end}
.durl-row .df{flex:1;margin-bottom:0}
.dfetch{height:40px;padding:0 14px;border-radius:var(--rs);border:1px solid var(--accent);background:transparent;color:var(--accent-dk);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;align-self:flex-end}
.dfetch:hover{background:var(--accent);color:#fff}
.dfetch:disabled{opacity:.5;cursor:not-allowed}
.dstatus{font-size:12px;color:var(--accent-dk);min-height:16px;margin-bottom:10px;margin-top:4px}
.dfoot{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.dsave{flex:1;height:44px;border-radius:var(--rs);border:none;background:var(--text);color:var(--bg);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:opacity .15s}
.dsave:hover{opacity:.85}
.ddel{height:44px;padding:0 16px;border-radius:var(--rs);border:1px solid #fca5a5;background:transparent;color:#dc2626;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;transition:all .15s}
.ddel:hover{background:#fff1f1}
/* outfit builder */
.ob-layout{display:grid;grid-template-columns:1fr 330px;gap:22px;align-items:start}
.ob-slots h2{font-family:'DM Serif Display',serif;font-size:21px;font-weight:400;margin-bottom:4px}
.ob-slots>p{font-size:13px;color:var(--muted);margin-bottom:1.25rem}
.ob-sec{margin-bottom:1.5rem}
.ob-sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ob-sec-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.ob-clr{font-size:11px;color:var(--light);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif}
.ob-clr:hover{color:var(--muted)}
.ob-scroll{display:flex;gap:9px;overflow-x:auto;padding-bottom:5px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.ob-scroll::-webkit-scrollbar{height:3px}
.ob-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.ob-chip{flex-shrink:0;width:105px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;cursor:pointer;transition:all .15s}
.ob-chip:hover{border-color:var(--accent);transform:translateY(-1px)}
.ob-chip.sel{border:2px solid var(--accent);box-shadow:0 0 0 3px rgba(196,152,74,.15)}
.ob-chip img{width:100%;height:85px;object-fit:cover;display:block;background:var(--input)}
.ob-chip .oc-sw{width:100%;height:85px;display:block}
.ob-chip .oc-nm{font-size:11px;padding:5px 7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.ob-none{font-size:13px;color:var(--light);padding:.5rem 0}
.ob-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.2rem;box-shadow:var(--sh);position:sticky;top:1rem}
.ob-panel h3{font-family:'DM Serif Display',serif;font-size:18px;font-weight:400;margin-bottom:1rem}
.ob-prev-list{display:flex;flex-direction:column;gap:9px;margin-bottom:1.1rem}
.ob-row{display:flex;align-items:center;gap:11px;padding:7px;border-radius:var(--rs);border:1px solid var(--border);background:var(--input);min-height:60px}
.ob-thumb{width:46px;height:46px;border-radius:6px;object-fit:cover;flex-shrink:0}
.ob-sw{width:46px;height:46px;border-radius:6px;flex-shrink:0}
.ob-empty-th{width:46px;height:46px;border-radius:6px;flex-shrink:0;background:var(--bg);border:1px dashed var(--border2);display:flex;align-items:center;justify-content:center;font-size:16px}
.ob-info{flex:1;min-width:0}
.ob-nm{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ob-sub{font-size:10px;color:var(--light);text-transform:uppercase;letter-spacing:.05em}
.ob-empty-txt{font-size:12px;color:var(--light);font-style:italic}
.ob-total{display:flex;align-items:baseline;justify-content:space-between;border-top:1px solid var(--border);padding:9px 0;margin-bottom:9px}
.ob-total-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.ob-total-amt{font-family:'DM Serif Display',serif;font-size:21px;color:var(--accent-dk)}
.ob-name-row{display:flex;gap:7px;margin-bottom:8px}
.ob-name-row input{flex:1;height:36px;padding:0 10px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--input);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
.ob-name-row input:focus{border-color:var(--accent)}
.ob-save{width:100%;height:41px;border-radius:var(--rs);border:none;background:var(--text);color:var(--bg);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s;margin-bottom:7px}
.ob-save:hover{opacity:.85}
.ob-reset{width:100%;height:35px;border-radius:var(--rs);border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s}
.ob-reset:hover{background:var(--input);color:var(--text)}
.saved-sec{margin-top:2rem}
.saved-sec h2{font-family:'DM Serif Display',serif;font-size:21px;font-weight:400;margin-bottom:1rem}
.saved-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:13px}
.scard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);transition:box-shadow .2s,transform .2s;position:relative}
.scard:hover{box-shadow:var(--sh2);transform:translateY(-2px)}
.scard-imgs{display:grid;grid-template-columns:1fr 1fr;height:130px;overflow:hidden;gap:2px}
.scard-imgs.one{grid-template-columns:1fr}
.scard-imgs.three>.si:last-child,.scard-imgs.three>.si-sw:last-child{grid-column:span 2}
.si{width:100%;height:100%;object-fit:cover;display:block}
.si-sw{width:100%;height:100%;display:block}
.scard-body{padding:11px 13px}
.scard-name{font-size:14px;font-weight:500;margin-bottom:3px}
.scard-meta{font-size:12px;color:var(--muted);margin-bottom:5px}
.scard-price{font-family:'DM Serif Display',serif;font-size:15px;color:var(--accent-dk)}
.scard-del{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;border:none;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;line-height:1;font-family:sans-serif}
.scard:hover .scard-del{opacity:1}
@media(max-width:760px){
  .ob-layout{grid-template-columns:1fr}
  .ob-panel{position:static}
  header,.main,#spendBar{padding-left:1rem;padding-right:1rem}
  header h1{font-size:28px}
}
</style>
</head>
<body>

<header>
  <h1>My Wardrobe</h1>
  <p>Your personal closet tracker</p>
  <nav class="tabs">
    <button class="tab on" onclick="showView('wardrobe',this)">Wardrobe</button>
    <button class="tab" onclick="showView('outfits',this)">Outfit Builder</button>
  </nav>
</header>

<div id="spendBar"></div>

<div class="main">

  <!-- WARDROBE -->
  <div class="view on" id="view-wardrobe">
    <div class="cat-bar" id="catBar"></div>
    <button class="add-trigger" onclick="openDrawer(null)">
      <span class="plus">+</span>
      Add a new wardrobe item
    </button>
    <div id="itemsWrap"></div>
  </div>

  <!-- OUTFIT BUILDER -->
  <div class="view" id="view-outfits">
    <div class="ob-layout">
      <div class="ob-slots">
        <h2>Build an outfit</h2>
        <p>Tap any piece to add it — tap again to remove</p>
        <div id="obSlots"></div>
      </div>
      <div class="ob-panel">
        <h3>Today's look</h3>
        <div class="ob-prev-list" id="obPreview"></div>
        <div class="ob-total">
          <span class="ob-total-lbl">Outfit value</span>
          <span class="ob-total-amt" id="obTotal">$0.00</span>
        </div>
        <div class="ob-name-row">
          <input type="text" id="obName" placeholder="Name this outfit…"/>
        </div>
        <button class="ob-save" onclick="saveOutfit()">Save outfit</button>
        <button class="ob-reset" onclick="resetOutfit()">Clear all</button>
      </div>
    </div>
    <div class="saved-sec">
      <h2>Saved outfits</h2>
      <div class="saved-grid" id="savedGrid"></div>
    </div>
  </div>

</div>

<!-- DRAWER -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="dh">
    <h3 id="dTitle">Add item</h3>
    <button class="dclose" onclick="closeDrawer()">&#215;</button>
  </div>
  <div class="dbody">
    <div class="dimg-wrap" id="dImgWrap">
      <div class="dimg-placeholder">Product image will appear here.<br/>Paste a link below and click Fetch.</div>
    </div>
    <div class="df">
      <label>Item name *</label>
      <input type="text" id="dName" placeholder="e.g. Black linen trousers"/>
    </div>
    <div class="dtwo">
      <div class="df">
        <label>Category</label>
        <select id="dCat">
          <option value="tops">Tops</option>
          <option value="shirts">Shirts / Tees</option>
          <option value="pants">Pants &amp; Jeans</option>
          <option value="jackets">Jackets &amp; Blazers</option>
          <option value="hoodies">Hoodies &amp; Sweaters</option>
          <option value="athleisure">Athleisure</option>
          <option value="dresses">Dresses</option>
          <option value="shoes">Shoes</option>
          <option value="bags">Bags</option>
          <option value="accessories">Accessories</option>
        </select>
      </div>
      <div class="df">
        <label>Price paid ($)</label>
        <input type="number" id="dPrice" placeholder="0.00" min="0" step="0.01"/>
      </div>
    </div>
    <div class="df">
      <label>Notes</label>
      <textarea id="dNotes" placeholder="Fit, material, occasion, where bought…"></textarea>
    </div>
    <div class="df">
      <label>Purchase link</label>
      <input type="url" id="dUrl" placeholder="https://www.zara.com/…"/>
    </div>
    <div class="durl-row" style="margin-bottom:0">
      <div class="df">
        <label>Image URL <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:10px">— or fetch from link above</span></label>
        <input type="url" id="dImgUrl" placeholder="https://…" oninput="dManualImg()"/>
      </div>
      <button class="dfetch" id="dFetchBtn" onclick="dFetch()">&#8595; Fetch</button>
    </div>
    <div class="dstatus" id="dStatus"></div>
    <div class="df">
      <label>Colour tag</label>
      <input type="color" id="dColor" value="#c4b9a8"/>
    </div>
  </div>
  <div class="dfoot">
    <button class="dsave" onclick="saveDrawer()">Save item</button>
    <button class="ddel" id="dDel" onclick="deleteItem()" style="display:none">Delete</button>
  </div>
</div>

<script>
var CATS=[
  {id:'tops',label:'Tops',icon:'👚'},
  {id:'shirts',label:'Shirts / Tees',icon:'👕'},
  {id:'pants',label:'Pants & Jeans',icon:'👖'},
  {id:'jackets',label:'Jackets & Blazers',icon:'🧥'},
  {id:'hoodies',label:'Hoodies & Sweaters',icon:'🩶'},
  {id:'athleisure',label:'Athleisure',icon:'🏃'},
  {id:'dresses',label:'Dresses',icon:'👗'},
  {id:'shoes',label:'Shoes',icon:'👟'},
  {id:'bags',label:'Bags',icon:'👜'},
  {id:'accessories',label:'Accessories',icon:'💍'},
];
var items=[], outfits=[], activeCat='all', outfit={}, editingId=null;

function load(){
  try{var s=localStorage.getItem('wrd-items'); if(s) items=JSON.parse(s);}catch(e){}
  try{var s=localStorage.getItem('wrd-outfits'); if(s) outfits=JSON.parse(s);}catch(e){}
}
function save(){localStorage.setItem('wrd-items',JSON.stringify(items));}
function saveO(){localStorage.setItem('wrd-outfits',JSON.stringify(outfits));}
function fmt(n){return'$'+Number(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function uid(){return Date.now()+Math.floor(Math.random()*9999);}

function showView(id,btn){
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('on');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  document.getElementById('view-'+id).classList.add('on');
  btn.classList.add('on');
  if(id==='outfits') renderOB();
}

function render(){renderSpend();renderCatBar();renderItems();}

function renderSpend(){
  var total=items.reduce(function(s,i){return s+(i.price||0);},0);
  var bar=document.getElementById('spendBar');
  if(!items.length){bar.innerHTML='';return;}
  var bits=CATS.map(function(c){
    var sum=items.filter(function(i){return i.category===c.id;}).reduce(function(s,i){return s+(i.price||0);},0);
    if(!sum)return'';
    return'<div class="sp-cat"><span class="n">'+fmt(sum)+'</span><span class="l">'+c.label+'</span></div>';
  }).join('');
  bar.innerHTML='<div class="sp-main"><span class="num">'+fmt(total)+'</span><span class="lbl">Total spent</span></div>'+(bits?'<div class="sp-cats">'+bits+'</div>':'');
}

function renderCatBar(){
  var bar=document.getElementById('catBar');
  var all=[{id:'all',label:'All'}].concat(CATS);
  bar.innerHTML=all.map(function(c){
    var cnt=c.id==='all'?items.length:items.filter(function(i){return i.category===c.id;}).length;
    var sp=c.id==='all'?items.reduce(function(s,i){return s+(i.price||0);},0):items.filter(function(i){return i.category===c.id;}).reduce(function(s,i){return s+(i.price||0);},0);
    if(c.id!=='all'&&cnt===0)return'';
    return'<button class="cb'+(activeCat===c.id?' on':'')+'" onclick="setCat(\''+c.id+'\')">'
      +c.label+(cnt>0?' <span style="opacity:.55">'+cnt+'</span>':'')+(sp>0?' <span style="opacity:.4;font-size:11px">'+fmt(sp)+'</span>':'')+'</button>';
  }).join('');
}

function setCat(c){activeCat=c;renderCatBar();renderItems();}

function renderItems(){
  var wrap=document.getElementById('itemsWrap');
  var fil=activeCat==='all'?items:items.filter(function(i){return i.category===activeCat;});
  if(!fil.length){wrap.innerHTML='<div class="grid"><div class="empty">No items yet — click "Add a new wardrobe item" above to get started</div></div>';return;}
  if(activeCat!=='all'){wrap.innerHTML='<div class="grid">'+fil.map(card).join('')+'</div>';return;}
  var groups={};
  fil.forEach(function(i){if(!groups[i.category])groups[i.category]=[];groups[i.category].push(i);});
  var html='';
  CATS.forEach(function(c){
    if(!groups[c.id])return;
    var sum=groups[c.id].reduce(function(s,i){return s+(i.price||0);},0);
    html+='<div class="section"><div class="sec-hd"><span>'+c.label+(sum?' &nbsp;·&nbsp; '+fmt(sum):'')+' </span></div><div class="grid">'+groups[c.id].map(card).join('')+'</div></div>';
  });
  wrap.innerHTML=html;
}

function card(item){
  var sc=item.color||'#c4b9a8';
  var media=item.imageUrl
    ?'<img src="'+esc(item.imageUrl)+'" loading="lazy" onerror="this.outerHTML=\'<div class=icard-swatch style=background:'+sc+'></div>\'">'
    :'<div class="icard-swatch" style="background:'+sc+'"></div>';
  var price=item.price>0?'<span class="icard-price">'+fmt(item.price)+'</span>':'<span class="icard-price" style="opacity:.3">—</span>';
  var link=item.purchaseUrl?'<a class="icard-link" href="'+esc(item.purchaseUrl)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">Shop ↗</a>':'';
  return'<div class="icard" onclick="openDrawer('+item.id+')">'
    +'<div class="icard-media">'+media+'<div class="edit-hint">✏ Edit</div></div>'
    +'<div class="icard-body"><div class="icard-name" title="'+esc(item.name)+'">'+esc(item.name)+'</div>'
    +'<div class="icard-cat">'+item.category+'</div>'
    +'<div class="icard-foot">'+price+link+'</div></div></div>';
}

/* DRAWER */
function openDrawer(id){
  editingId=id;
  var item=id?items.find(function(i){return i.id===id;}):null;
  document.getElementById('dTitle').textContent=item?'Edit item':'Add item';
  document.getElementById('dName').value=item?(item.name||''):'';
  document.getElementById('dCat').value=item?(item.category||'tops'):'tops';
  document.getElementById('dPrice').value=item&&item.price>0?item.price:'';
  document.getElementById('dNotes').value=item?(item.notes||''):'';
  document.getElementById('dUrl').value=item?(item.purchaseUrl||''):'';
  document.getElementById('dImgUrl').value=item&&item.imageUrl&&item.imageUrl.startsWith('http')?item.imageUrl:'';
  document.getElementById('dColor').value=item?(item.color||'#c4b9a8'):'#c4b9a8';
  document.getElementById('dStatus').textContent='';
  document.getElementById('dDel').style.display=item?'block':'none';
  setDImg(item?item.imageUrl:'');
  document.getElementById('overlay').classList.add('on');
  document.getElementById('drawer').classList.add('on');
  document.body.style.overflow='hidden';
  setTimeout(function(){document.getElementById('dName').focus();},320);
}

function closeDrawer(){
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('drawer').classList.remove('on');
  document.body.style.overflow='';
  editingId=null;
}

function setDImg(src){
  var w=document.getElementById('dImgWrap');
  if(src){
    w.innerHTML='<img src="'+esc(src)+'" style="width:100%;height:100%;object-fit:contain" onerror="this.parentElement.innerHTML=\'<div class=dimg-placeholder>Could not load image — try a different URL</div>\'">';
  } else {
    w.innerHTML='<div class="dimg-placeholder">Product image will appear here.<br/>Paste a link below and click Fetch.</div>';
  }
}

function dManualImg(){
  var url=document.getElementById('dImgUrl').value.trim();
  setDImg(url||'');
}

async function dFetch(){
  var url=document.getElementById('dUrl').value.trim();
  if(!url){document.getElementById('dStatus').textContent='Paste a purchase link first.';return;}
  var btn=document.getElementById('dFetchBtn');
  btn.disabled=true; btn.textContent='…';
  document.getElementById('dStatus').textContent='Fetching image from product page…';
  try{
    var res=await fetch('https://api.microlink.io/?url='+encodeURIComponent(url));
    var data=await res.json();
    var img=(data&&data.data&&data.data.image&&data.data.image.url)||'';
    if(img){
      document.getElementById('dImgUrl').value=img;
      setDImg(img);
      document.getElementById('dStatus').textContent='✓ Image found!';
    } else {
      document.getElementById('dStatus').textContent='No image found — paste an image URL manually.';
    }
  }catch(e){
    document.getElementById('dStatus').textContent='Could not fetch — paste an image URL manually.';
  }
  btn.disabled=false; btn.textContent='↓ Fetch';
}

function saveDrawer(){
  var name=document.getElementById('dName').value.trim();
  if(!name){alert('Please enter a name for this item.');document.getElementById('dName').focus();return;}
  var p=parseFloat(document.getElementById('dPrice').value);
  var imgUrl=document.getElementById('dImgUrl').value.trim();
  // preserve existing image if editing and no new URL entered
  if(!imgUrl&&editingId){
    var old=items.find(function(i){return i.id===editingId;});
    if(old) imgUrl=old.imageUrl||'';
  }
  var entry={
    id:editingId||uid(),
    name:name,
    category:document.getElementById('dCat').value,
    price:isNaN(p)?0:p,
    notes:document.getElementById('dNotes').value.trim(),
    purchaseUrl:document.getElementById('dUrl').value.trim(),
    imageUrl:imgUrl,
    color:document.getElementById('dColor').value,
  };
  if(editingId){
    var idx=items.findIndex(function(i){return i.id===editingId;});
    if(idx!==-1) items[idx]=entry; else items.push(entry);
  } else {
    items.push(entry);
  }
  save(); render(); closeDrawer();
}

function deleteItem(){
  if(!editingId)return;
  var item=items.find(function(i){return i.id===editingId;});
  if(!item)return;
  if(!confirm('Remove "'+item.name+'" from your wardrobe?'))return;
  items=items.filter(function(i){return i.id!==editingId;});
  CATS.forEach(function(c){if(outfit[c.id]&&outfit[c.id].id===editingId)delete outfit[c.id];});
  save(); render(); closeDrawer();
}

/* OUTFIT BUILDER */
function renderOB(){renderObSlots();renderObPreview();renderSaved();}

function renderObSlots(){
  var el=document.getElementById('obSlots');
  el.innerHTML=CATS.map(function(c){
    var ci=items.filter(function(i){return i.category===c.id;});
    var sel=outfit[c.id];
    var hd='<div class="ob-sec"><div class="ob-sec-hd"><span class="ob-sec-title">'+c.icon+' '+c.label+'</span>'+(sel?'<button class="ob-clr" onclick="rmSlot(\''+c.id+'\')">Remove</button>':'')+'</div>';
    if(!ci.length)return hd+'<div class="ob-none">No '+c.label.toLowerCase()+' added yet</div></div>';
    var chips=ci.map(function(item){
      var s=item.color||'#c4b9a8';
      var isSel=sel&&sel.id===item.id;
      var th=item.imageUrl
        ?'<img src="'+esc(item.imageUrl)+'" onerror="this.outerHTML=\'<div class=oc-sw style=background:'+s+'></div>\'">'
        :'<div class="oc-sw" style="background:'+s+'"></div>';
      return'<div class="ob-chip'+(isSel?' sel':'')+'" onclick="toggleSlot(\''+c.id+'\','+item.id+')">'+th+'<div class="oc-nm">'+esc(item.name)+'</div></div>';
    }).join('');
    return hd+'<div class="ob-scroll">'+chips+'</div></div>';
  }).join('');
}

function toggleSlot(cat,id){
  var item=items.find(function(i){return i.id===id;});
  if(!item)return;
  outfit[cat]=(outfit[cat]&&outfit[cat].id===id)?null:item;
  renderOB();
}
function rmSlot(cat){outfit[cat]=null;renderOB();}
function resetOutfit(){outfit={};document.getElementById('obName').value='';renderOB();}

function renderObPreview(){
  var list=document.getElementById('obPreview');
  var total=0;
  list.innerHTML=CATS.map(function(c){
    var item=outfit[c.id];
    if(!item)return'<div class="ob-row"><div class="ob-empty-th">'+c.icon+'</div><span class="ob-empty-txt">No '+c.label.toLowerCase()+' selected</span></div>';
    total+=(item.price||0);
    var s=item.color||'#c4b9a8';
    var th=item.imageUrl
      ?'<img class="ob-thumb" src="'+esc(item.imageUrl)+'" onerror="this.outerHTML=\'<div class=ob-sw style=background:'+s+'></div>\'">'
      :'<div class="ob-sw" style="background:'+s+'"></div>';
    return'<div class="ob-row">'+th+'<div class="ob-info"><div class="ob-nm">'+esc(item.name)+'</div><div class="ob-sub">'+item.category+(item.price>0?' · '+fmt(item.price):'')+' </div></div></div>';
  }).join('');
  document.getElementById('obTotal').textContent=fmt(total);
}

function saveOutfit(){
  var sel=CATS.map(function(c){return outfit[c.id];}).filter(Boolean);
  if(!sel.length){alert('Select at least one item first.');return;}
  var name=document.getElementById('obName').value.trim()||('Outfit '+(outfits.length+1));
  outfits.push({id:uid(),name:name,items:sel.map(function(i){return i.id;})});
  saveO(); document.getElementById('obName').value=''; resetOutfit(); renderSaved();
}

function delOutfit(id){
  if(!confirm('Delete this outfit?'))return;
  outfits=outfits.filter(function(o){return o.id!==id;});
  saveO(); renderSaved();
}

function renderSaved(){
  var grid=document.getElementById('savedGrid');
  if(!outfits.length){grid.innerHTML='<div style="color:var(--light);font-size:14px;padding:.5rem 0">No outfits saved yet — build one above!</div>';return;}
  grid.innerHTML=outfits.map(function(o){
    var oi=o.items.map(function(id){return items.find(function(i){return i.id===id;});}).filter(Boolean);
    var total=oi.reduce(function(s,i){return s+(i.price||0);},0);
    var imgs=oi.slice(0,4).map(function(item){
      var s=item.color||'#c4b9a8';
      return item.imageUrl?'<img class="si" src="'+esc(item.imageUrl)+'" onerror="this.style.background=\''+s+'\';this.removeAttribute(\'src\')">':'<div class="si-sw" style="background:'+s+'"></div>';
    }).join('');
    var cc=oi.length===1?'one':oi.length===3?'three':'';
    return'<div class="scard"><button class="scard-del" onclick="delOutfit('+o.id+')">&#215;</button>'
      +'<div class="scard-imgs '+cc+'">'+imgs+'</div>'
      +'<div class="scard-body"><div class="scard-name">'+esc(o.name)+'</div>'
      +'<div class="scard-meta">'+oi.length+' piece'+(oi.length!==1?'s':'')+'</div>'
      +(total>0?'<div class="scard-price">'+fmt(total)+'</div>':'')
      +'</div></div>';
  }).join('');
}

document.addEventListener('keydown',function(e){if(e.key==='Escape')closeDrawer();});
document.getElementById('dName').addEventListener('keydown',function(e){if(e.key==='Enter')saveDrawer();});

load();
render();
</script>
</body>
